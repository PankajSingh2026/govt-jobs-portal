<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="92"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="#FFFFFF" stroke="#14213D" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#14213D" stroke-width="1.2"/>

  <!-- Eye shape (Netra) -->
  <g>
    <!-- Almond outline -->
    <path d="M 34 100 Q 100 52 166 100 Q 100 148 34 100 Z"
          fill="none" stroke="#14213D" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Iris -->
    <circle cx="100" cy="100" r="26" fill="#14213D"/>
    <circle cx="100" cy="100" r="26" fill="none" stroke="#FF9933" stroke-width="2.5"/>
    <!-- Pupil highlight -->
    <circle cx="92" cy="92" r="7" fill="#FFFFFF"/>
    <!-- Upper lash accents (alertness / watchfulness) -->
    <path d="M 52 78 Q 46 68 40 66" fill="none" stroke="#14213D" stroke-width="3" stroke-linecap="round"/>
    <path d="M 148 78 Q 154 68 160 66" fill="none" stroke="#14213D" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Tricolor arc at base -->
  <g clip-path="url(#circleClip)">
    <path d="M 20 168 A 92 92 0 0 0 76 190" fill="none" stroke="#FF9933" stroke-width="6"/>
    <path d="M 76 190 A 92 92 0 0 0 124 190" fill="none" stroke="#F4F4F2" stroke-width="6"/>
    <path d="M 124 190 A 92 92 0 0 0 180 168" fill="none" stroke="#128807" stroke-width="6"/>
  </g>
</svg>
